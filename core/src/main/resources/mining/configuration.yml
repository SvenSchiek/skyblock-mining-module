mining:
  require_registered_mine: true

  level:
    maximum_level: 100
    base_experience: 100
    experience_multiplier: 1.20

  prestige:
    maximum_prestige: 10
    experience_bonus_per_prestige: 0.05
    damage_bonus_per_prestige: 0.025

  session:
    tick_interval: 2
    maximum_distance: 6.0
    depleted_material: BEDROCK
    particle_view_distance: 24.0

  animation:
    enabled: true
    hit_particle_amount: 3
    break_particle_amount: 22
    respawn_particle_amount: 16

